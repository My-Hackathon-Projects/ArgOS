# Advisory CI — lightweight self-verification for agentic dev, not a required gate.
# Runs only when backend files change. Green = lint + format + tests pass.
name: backend

on:
  pull_request:
    paths: ['backend/**', '.github/workflows/backend.yml']
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend.yml']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest -q
