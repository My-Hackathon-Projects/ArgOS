# Advisory CI — lightweight self-verification for agentic dev, not a required gate.
# Runs only when backend files change. Green = lint + format + tests pass.
name: backend

on:
  pull_request:
    paths: ['backend/**', '.github/workflows/backend.yml']
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend.yml']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Mirrors docker-compose.yml: tests run against a real Postgres + pgvector
      # on host port 5433 (the app's default database_url).
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vcbrain
          POSTGRES_PASSWORD: vcbrain
          POSTGRES_DB: vcbrain
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vcbrain -d vcbrain"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Migrate DB
        run: uv run alembic upgrade head

      - name: Tests
        # dev_bed tests validate the live-sourced eval bed in the shared dev DB;
        # they cannot pass against CI's fresh database.
        run: uv run pytest -q -m "not dev_bed"
